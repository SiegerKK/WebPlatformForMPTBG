name: CI

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-core:
    name: Backend core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend core tests
        env:
          PYTHONPATH: backend
          MEDIA_ROOT: /tmp/media
        run: |
          pytest \
            backend/tests/test_*.py \
            -q \
            --ignore=backend/tests/test_zone_stalkers.py \
            --ignore=backend/tests/test_zone_stalkers_tick.py \
            --ignore=backend/tests/test_zone_stalkers_copy_on_write_runtime.py \
            --ignore=backend/tests/test_zone_stalkers_location_images.py \
            --ignore=backend/tests/test_memory_merge.py

  backend-zone-stalkers-core:
    name: Zone Stalkers core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run Zone Stalkers core tests
        env:
          PYTHONPATH: backend
          MEDIA_ROOT: /tmp/media
        run: |
          pytest \
            backend/tests/test_zone_stalkers.py \
            backend/tests/test_zone_stalkers_tick.py \
            backend/tests/test_zone_stalkers_copy_on_write_runtime.py \
            backend/tests/test_zone_stalkers_location_images.py \
            -q

  backend-decision-core:
    name: Decision core tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run decision core tests
        env:
          PYTHONPATH: backend
          MEDIA_ROOT: /tmp/media
        run: |
          pytest \
            backend/tests/decision \
            -vv -s \
            --durations=25 \
            --durations-min=1.0 \
            --ignore=backend/tests/decision/v3/test_e2e_brain_v3_goals.py

  backend-memory-pr5:
    name: Memory v3 / PR5 tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run memory v3 tests
        env:
          PYTHONPATH: backend
          MEDIA_ROOT: /tmp/media
        run: |
          pytest \
            backend/tests/decision/v3/test_memory_store.py \
            backend/tests/decision/v3/test_memory_retrieval.py \
            backend/tests/decision/v3/test_memory_retrieval_fast_path.py \
            backend/tests/decision/v3/test_memory_v3_only_runtime.py \
            backend/tests/decision/test_context_builder_memory_v3.py \
            -q

  backend-brain-v3-e2e:
    name: Brain v3 E2E tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_file:
          - backend/tests/decision/v3/test_e2e_brain_v3_goals.py
          - backend/tests/decision/v3/test_hunt_leads.py
          - backend/tests/decision/v3/test_hunt_fixes.py
          - backend/tests/decision/v3/test_hunt_kill_stalker_goal.py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run Brain v3 E2E file
        env:
          PYTHONPATH: backend
          MEDIA_ROOT: /tmp/media
        run: pytest ${{ matrix.test_file }} -q

  backend-full-sentinel:
    name: Backend full non-e2e sentinel
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run full non-e2e backend suite
        env:
          PYTHONPATH: backend
          MEDIA_ROOT: /tmp/media
        run: pytest backend/tests -k "not e2e" -vv -s --durations=25 --durations-min=1.0

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
