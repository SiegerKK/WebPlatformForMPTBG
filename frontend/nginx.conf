server {
    listen 80;
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket upgrade support.
        # Without these headers nginx proxies the request as plain HTTP/1.0,
        # stripping the Upgrade header — the backend never sees a WS upgrade
        # and the browser gets a non-101 response (code 1006).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Keep long-lived WebSocket connections alive.
        # Default (60 s) would kill idle sockets between turns.
        # The frontend pings every 20 s so 3600 s is a generous fallback.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
